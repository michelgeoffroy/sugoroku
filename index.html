
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミシェすごろく</title>
<style>
:root {
  --board-size: 380px;
  --sidebar-width: 140px;
  --game-height: var(--game-height);
  --gap: 8px;
  --card-radius: 8px;
  --panel-bg: #252620;
  --panel-border: 0.5px solid #3a3a2e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111310;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  padding: 16px;
}

#scale-wrapper {
  transform-origin: top center;
  width: fit-content;
}

/*
  グリッド設計（1枚目要望スクショ基準）
  列: [左サイド 190px] [盤面 380px] [右サイド 140px]
  行: [上部(P4/P3/ログ上)] [中部(ログ中)] [下部(P2/P1/サイコロ)]
  
  配置:
  - タイトル: 全体の外（上）
  - P4: 左列 行1
  - 盤面: 中央列 行1-3
  - P3: 右列 行1
  - ログ: 右列 行1-2（P3と同じ上端、サイコロの上まで）
  - P2: 左列 行3
  - P1: 中央列 行3（盤面下）
  - サイコロ: 右列 行3
  - P1のターン: サイコロ下
*/

#wrapper {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#game-title {
  font-size: 15px;
  font-weight: 500;
  color: #c8c4a8;
  letter-spacing: 0.08em;
}

#game {
  display: grid;
  grid-template-columns: var(--board-size) var(--sidebar-width);
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: var(--gap);
  height: var(--game-height);
}

/* 盤面: 左列 全行 */
#board-cell { grid-column: 1; grid-row: 1 / 4; display: flex; flex-direction: column; gap: 8px; }
canvas#board { display: block; width: var(--board-size); height: var(--board-size); border-radius: 10px; cursor: default; flex-shrink: 0; }
#board-top { display: flex; gap: 8px; }
#board-top .player-card { flex: 1; }
#board-bottom { display: flex; gap: 8px; }
#board-bottom .player-card { flex: 1; }
#p4-cell { display: none; }
#p3-cell { display: none; }
#p2-cell { display: none; }

/* ログ: 右列 行1〜2 */
#log-cell { grid-column: 2; grid-row: 1 / 3; position: relative; }
#log { background: var(--panel-bg); border-radius: var(--card-radius); padding: 8px 10px; border: var(--panel-border); display: flex; flex-direction: column; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
#log-label { font-size: 11px; color: #6b6a5a; margin-bottom: 4px; flex-shrink: 0; }
#log-entries { font-size: 10px; color: #7a7a68; line-height: 1.8; overflow-y: auto; flex: 1; min-height: 0; }

/* サイコロ: 右列 行3 */
#yut-cell { grid-column: 2; grid-row: 3; }


/* プレイヤーカード */
.player-card { background: var(--panel-bg); border-radius: var(--card-radius); padding: 6px 10px; border: var(--panel-border); transition: border-color 0.2s; overflow: visible; }
.player-card.active { border-color: #8a7e52; }
.pc-name { font-size: 11px; color: #9a9680; white-space: nowrap; }
.pc-header { display: flex; align-items: center; gap: 6px; }
.pc-pieces { display: flex; gap: 4px; flex-wrap: wrap; min-height: 16px; overflow: visible; }
.piece-dot { width: 32px; height: 32px; border-radius: 50%; }
.piece-dot.done { opacity: 0.25; }
.piece-dot.selectable { cursor: pointer; box-shadow: 0 0 0 2px #fff; }

/* サイコロパネル */
#yut-panel { background: var(--panel-bg); border-radius: var(--card-radius); padding: 8px 10px; border: var(--panel-border); }
#yut-label { font-size: 11px; color: #6b6a5a; margin-bottom: 6px; }
#yut-sticks { display: flex; gap: 3px; justify-content: center; margin-bottom: 6px; }
.stick { width: 9px; height: 36px; border-radius: 5px; }
.stick.up { background: #c8b87a; }
.stick.down { background: #3a3428; border: 0.5px solid #5a5240; }
#yut-result { font-size: 13px; font-weight: 500; color: #c8b87a; text-align: center; min-height: 16px; margin-bottom: 4px; }
#pending-rolls { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin-bottom: 6px; min-height: 18px; }
.roll-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #3a3428; border: 0.5px solid #6b6040; color: #c8b87a; }
.roll-badge.used { opacity: 0.3; text-decoration: line-through; }
#roll-btn { width: 100%; padding: 7px; background: #2e2d20; border: 0.5px solid #6b6040; border-radius: 6px; color: #c8b87a; font-size: 12px; font-weight: 500; cursor: pointer; margin-bottom: 4px; }
#roll-btn:hover:not(:disabled) { background: #3a3928; }
#roll-btn:disabled { opacity: 0.4; cursor: default; }
#move-btn { display: none; }
#rolls-remaining { font-size: 11px; color: #8a9870; text-align: center; min-height: 16px; margin-bottom: 4px; }
#turn-info { font-size: 11px; color: #6b6a5a; text-align: center; margin-top: 6px; }
#msg-bar { font-size: 11px; color: #8a9870; text-align: center; min-height: 16px; }

#overlay { display: none; position: fixed; inset: 0; background: rgba(10,12,8,0.88); align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 100; }
#overlay h2 { font-size: 22px; font-weight: 500; color: #c8c4a8; }
#overlay p { font-size: 14px; color: #6b6a5a; }
#restart-btn { padding: 10px 32px; background: #2e2d20; border: 0.5px solid #6b6040; border-radius: 8px; color: #c8b87a; font-size: 14px; font-weight: 500; cursor: pointer; }
#restart-btn:hover { background: #3a3928; }

#start-screen { display: flex; position: fixed; inset: 0; background: rgba(10,12,8,0.96); align-items: center; justify-content: center; flex-direction: column; gap: 20px; z-index: 200; }
#start-screen h1 { font-size: 26px; font-weight: 500; color: #c8c4a8; letter-spacing: 0.1em; margin-bottom: 8px; }
.cpu-setting { display: flex; flex-direction: column; gap: 12px; background: #252620; border-radius: 8px; padding: 16px 20px; border: 0.5px solid #3a3a2e; width: 280px; }
.cpu-row { display: flex; justify-content: space-between; align-items: center; }
.cpu-name { font-size: 13px; color: #9a9680; }
.level-btns { display: flex; gap: 4px; }
.level-btn { padding: 4px 10px; border-radius: 4px; border: 0.5px solid #5a5a3a; background: #2e2d20; color: #7a7a68; font-size: 11px; cursor: pointer; }
.level-btn.active { background: #4a3e18; border-color: #c8b87a; color: #c8b87a; }
.level-btn:hover:not(.active) { background: #3a3928; }
#start-game-btn { padding: 12px 40px; background: #3a3010; border: 0.5px solid #c8b87a; border-radius: 8px; color: #c8b87a; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
#start-game-btn:hover { background: #4a4018; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="scale-wrapper">
<div id="game-title">ミシェすごろく</div>

  <div id="game">


    <!-- 盤面: 左列 全行 -->
    <div id="board-cell">
      <div id="board-top">
        <div class="player-card" id="pc2"><div class="pc-header"><div class="pc-name" id="pname2">P3</div><div class="pc-pieces" id="pp2"></div></div></div>
        <div class="player-card" id="pc3"><div class="pc-header"><div class="pc-name" id="pname3">P4</div><div class="pc-pieces" id="pp3"></div></div></div>
      </div>
      <canvas id="board" width="380" height="380"></canvas>
      <div id="board-bottom">
        <div class="player-card" id="pc1"><div class="pc-header"><div class="pc-name" id="pname1">P2</div><div class="pc-pieces" id="pp1"></div></div></div>
        <div class="player-card active" id="pc0"><div class="pc-header"><div class="pc-name" id="pname0">P1</div><div class="pc-pieces" id="pp0"></div></div></div>
      </div>
      <div id="msg-bar"></div>
    </div>



    <!-- ログ: 右列 行2 -->
    <div id="log-cell">
      <div id="log"><div id="log-label">ログ</div><div id="log-entries"></div></div>
    </div>

    <!-- サイコロ: 右列 行3 -->
    <div id="yut-cell">
      <div id="yut-panel">
        <div id="yut-label">棒を投げる</div>
        <div id="yut-sticks">
          <div class="stick up" id="s0"></div><div class="stick up" id="s1"></div>
          <div class="stick up" id="s2"></div><div class="stick down" id="s3"></div>
        </div>
        <div id="yut-result">－</div>
        <div id="pending-rolls"></div>
        <button id="roll-btn">投げる</button>
        <div id="rolls-remaining"></div>
        <div id="turn-info">P1のターン</div>
      </div>
    </div>
  </div>
</div>

<div id="start-screen">
  <h1>ミシェすごろく</h1>
  <div class="cpu-setting">
    <div class="cpu-row">
      <span class="cpu-name">P2</span>
      <div class="level-btns" data-player="1">
        <button class="level-btn active" data-level="1">弱</button>
        <button class="level-btn" data-level="2">中</button>
        <button class="level-btn" data-level="3">強</button>
      </div>
    </div>
    <div class="cpu-row">
      <span class="cpu-name">P3</span>
      <div class="level-btns" data-player="2">
        <button class="level-btn active" data-level="1">弱</button>
        <button class="level-btn" data-level="2">中</button>
        <button class="level-btn" data-level="3">強</button>
      </div>
    </div>
    <div class="cpu-row">
      <span class="cpu-name">P4</span>
      <div class="level-btns" data-player="3">
        <button class="level-btn active" data-level="1">弱</button>
        <button class="level-btn" data-level="2">中</button>
        <button class="level-btn" data-level="3">強</button>
      </div>
    </div>
  </div>
  <button id="start-game-btn">ゲームスタート</button>
</div>
</div>

<div id="overlay">
  <h2 id="win-text">P1の勝利！</h2>
  <p>全コマをゴールに運んだ！</p>
  <button id="restart-btn">もう一度</button>
</div>

const DIAG_RU=[pt(4,1),pt(3,2),CENTER,pt(2,3),pt(1,4)];
const DIAG_RD=[pt(1,1),pt(2,2),CENTER,pt(3,3),pt(4,4)];

const AC=new(window.AudioContext||window.webkitAudioContext)();
function rac(){if(AC.state==='suspended')AC.resume();}
const SE={
  roll(){
    rac();
    // がしゃがしゃ×3
    [0, 0.12, 0.24].forEach(delay=>{
      const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*0.08),AC.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){const t=i/AC.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*30);}
      const src=AC.createBufferSource();src.buffer=buf;
      const g=AC.createGain();g.gain.value=0.28;
      src.connect(g);g.connect(AC.destination);
      src.start(AC.currentTime+delay);
    });
    // 0.3秒無音→ピコーン（上昇音）
    setTimeout(()=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(400,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(1000,AC.currentTime+0.12);
      g.gain.setValueAtTime(0,AC.currentTime);
      g.gain.linearRampToValueAtTime(0.55,AC.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.35);
      o.connect(g);g.connect(AC.destination);
      o.start();o.stop(AC.currentTime+0.35);
    }, 540);
  },
  move(){rac();const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.exponentialRampToValueAtTime(300,AC.currentTime+0.06);g.gain.setValueAtTime(0.35,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.08);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.08);},
  corner(){rac();const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(660,AC.currentTime);g.gain.setValueAtTime(0.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.5);},
  capture(){rac();const buf=AC.createBuffer(1,AC.sampleRate*0.15,AC.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/AC.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*40);}const src=AC.createBufferSource();src.buffer=buf;const g=AC.createGain();g.gain.value=0.7;const o=AC.createOscillator(),g2=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(120,AC.currentTime);o.frequency.exponentialRampToValueAtTime(60,AC.currentTime+0.1);g2.gain.setValueAtTime(0.4,AC.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.12);src.connect(g);g.connect(AC.destination);o.connect(g2);g2.connect(AC.destination);src.start();o.start();o.stop(AC.currentTime+0.12);},
  goal(){rac();[523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;const t=AC.currentTime+i*0.1;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.4,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.3);});},
  win(){rac();[523,659,784,659,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.value=f;const t=AC.currentTime+[0,0.15,0.3,0.45,0.6][i];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.35);});},
  nextTurn(){rac();[880,1100].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;const t=AC.currentTime+i*0.08;g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.12);});},
};

let state=null;
let animating=false; // アニメーション中フラグ
let showArrows=false;
let rollLimit=4; // ロール上限（通常4、踏んだ後2） // 矢印表示フラグ（明示的にtrueにしたときだけ表示）
let animTarget=null; // アニメーション中のコマ {pi, ci}

// 経路上の全座標を計算
function calcPath(piece, steps){
  const path=[];
  let pos=piece.pos, route=piece.route, diagPos=piece.diagPos;

  if(pos===-1){ pos=0; path.push(OUTER[0]); }

  if(route==='outer'&&pos===5){ route='diagRU'; diagPos=-1; }
  else if(route==='outer'&&pos===10){ route='diagRD'; diagPos=-1; }
  if(route==='diagRU'&&diagPos===2){ route='diagRD'; diagPos=2; }

  let remaining=steps;
  while(remaining>0){
    if(route==='outer'){
      pos=(pos+1)%20; remaining--;
      path.push(OUTER[pos]);
      if(pos===0) break;
      if(remaining===0&&(pos===5||pos===10)) break;
    }else if(route==='diagRU'){
      diagPos++; remaining--;
      if(diagPos>4){ route='outer'; pos=15; diagPos=-1; path.push(OUTER[15]); }
      else path.push(DIAG_RU[diagPos]);
    }else if(route==='diagRD'){
      diagPos++; remaining--;
      if(diagPos>4){ route='outer'; pos=0; diagPos=-1; path.push(OUTER[0]); break; }
      else path.push(DIAG_RD[diagPos]);
    }
  }
  return path;
}

// スライドアニメーション
function animateMove(playerIdx, pieceIdx, steps, onComplete){
  const piece=state.pieces[playerIdx][pieceIdx];
  const path=calcPath(piece, steps);
  if(path.length===0){ onComplete(); return; }

  animating=true;
  showArrows=false;
  animTarget={pi:playerIdx, ci:pieceIdx};
  state.selectedPieceIdx=null;
  state.currentRoll=null;
  updateCards(); // アニメ開始直後にサイドパネルを更新（対象コマを隠す）
  const msPerStep=300;
  let stepIdx=0;

  // 現在の描画座標（アニメーション用）
  const startCoord = piece.pos===-1 ? OUTER[0] : (getPieceCoord(piece)||OUTER[0]);
  let animCoords={};
  animCoords[`${playerIdx}_${pieceIdx}`]={x:startCoord.x, y:startCoord.y};

  // 元の描画関数をオーバーライドする代わりに、アニメ座標を持つ専用描画
  function drawFrame(){
    // 通常のdrawBoardを呼びつつ、対象コマだけアニメ座標で上書き
    drawBoard();
    const ac=animCoords[`${playerIdx}_${pieceIdx}`];
    if(!ac) return;
    const charImg=charImgs[playerIdx];
    if(charImg&&charImg.complete&&charImg.naturalWidth>0){
      ctx.save();
      const ix=ac.x-20,iy=ac.y-24;
      ctx.globalAlpha=0.8;
      for(const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]){ctx.drawImage(charImg,ix+dx,iy+dy,40,40);}
      ctx.globalAlpha=1;
      ctx.drawImage(charImg,ix,iy,40,40);
      ctx.restore();
    }else{
      ctx.fillStyle=PLAYER_COLORS[playerIdx];
      ctx.beginPath();ctx.arc(ac.x,ac.y,8,0,Math.PI*2);ctx.fill();
    }
  }

  function stepTo(targetCoord, fromCoord, duration, cb){
    const startTime=performance.now();
    function tick(now){
      const t=Math.min((now-startTime)/duration,1);
      const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; // easeInOut
      animCoords[`${playerIdx}_${pieceIdx}`]={
        x:fromCoord.x+(targetCoord.x-fromCoord.x)*ease,
        y:fromCoord.y+(targetCoord.y-fromCoord.y)*ease,
      };
      drawFrame();
      if(t<1) requestAnimationFrame(tick);
      else cb();
    }
    requestAnimationFrame(tick);
  }

  function nextStep(){
    if(stepIdx>=path.length){ animating=false; animTarget=null; onComplete(); return; }
    const from=stepIdx===0?startCoord:path[stepIdx-1];
    const to=path[stepIdx];
    stepIdx++;
    stepTo(to, from, msPerStep, nextStep);
  }

  nextStep();
}
function initState(){return{turn:0,pieces:Array.from({length:NUM_PLAYERS},()=>Array.from({length:NUM_PIECES},()=>({pos:-1,route:'outer',diagPos:-1}))),phase:'roll',rolls:[],rollCount:0,currentRoll:null,selectedPieceIdx:null,log:[]};}

function getPieceCoord(p){
  if(p.pos===-1||p.pos===20)return null;
  if(p.route==='outer')return OUTER[p.pos];
  if(p.route==='diagRU'){if(p.diagPos===-1)return OUTER[p.pos];if(p.diagPos>=0&&p.diagPos<=4)return DIAG_RU[p.diagPos];return null;}
  if(p.route==='diagRD'){if(p.diagPos===-1)return OUTER[p.pos];if(p.diagPos>=0&&p.diagPos<=4)return DIAG_RD[p.diagPos];return null;}
  return null;
}

function movePiece(piece,steps){
  let pos=piece.pos,route=piece.route,diagPos=piece.diagPos;
  let remaining=steps,reachedGoal=false,stoppedAtCorner=false;
  if(pos===-1)pos=0;
  if(route==='outer'&&pos===5){route='diagRU';diagPos=-1;}
  else if(route==='outer'&&pos===10){route='diagRD';diagPos=-1;}
  if(route==='diagRU'&&diagPos===2){route='diagRD';diagPos=2;}
  while(remaining>0){
    if(route==='outer'){
      pos=(pos+1)%20;remaining--;
      if(pos===0){reachedGoal=true;break;}
      if(remaining===0&&(pos===5||pos===10)){stoppedAtCorner=true;break;}
    }else if(route==='diagRU'){
      diagPos++;remaining--;
      if(diagPos>4){route='outer';pos=15;diagPos=-1;}
    }else if(route==='diagRD'){
      diagPos++;remaining--;
      if(diagPos>4){route='outer';pos=0;diagPos=-1;reachedGoal=true;break;}
    }
  }
  return{pos,route,diagPos,reachedGoal,stoppedAtCorner};
}

function getDestCoord(piece,steps){
  const r=movePiece(piece,steps);
  if(r.reachedGoal)return{goal:true};
  const tmp={pos:r.pos,route:r.route,diagPos:r.diagPos};
  if(r.stoppedAtCorner){tmp.route='outer';tmp.diagPos=-1;}
  const c=getPieceCoord(tmp);
  return c?{coord:c,result:r}:null;
}

function checkCapture(playerIdx,coord){
  if(!coord)return false;
  let captured=false;
  for(let op=0;op<NUM_PLAYERS;op++){
    if(op===playerIdx)continue;
    for(let oc=0;oc<NUM_PIECES;oc++){
      const other=state.pieces[op][oc];
      if(other.pos===20||other.pos===-1)continue;
      const c2=getPieceCoord(other);if(!c2)continue;
      if(Math.abs(c2.x-coord.x)<1&&Math.abs(c2.y-coord.y)<1){
        other.pos=-1;other.route='outer';other.diagPos=-1;
        SE.capture();addLog(`${PLAYER_NAMES[playerIdx]} が ${PLAYER_NAMES[op]} を踏んだ！`);
        captured=true;
      }
    }
  }
  return captured;
}

function rollYut(){
  const faces=Array.from({length:4},()=>Math.random()<0.5?'up':'down');
  // 確率調整: 1=20%, 2=27.5%, 3=27.5%, 4=14%, 5=11%
  const r=Math.random();
  let val;
  if(r<0.20) val=1;
  else if(r<0.475) val=2;
  else if(r<0.75) val=3;
  else if(r<0.89) val=4;
  else val=5;
  if(state.rollCount>=3&&val>=4)val=Math.ceil(Math.random()*3);
  // 棒のアニメはvalに合わせて表示を調整
  const upCount=val===5?0:val===4?4:val;
  let up=0;
  faces.forEach((_,i)=>{if(i<upCount)faces[i]='up';else faces[i]='down';});
  return{faces,val};
}

function applyMove(playerIdx,pieceIdx,rollVal){
  if(animating) return;
  const piece=state.pieces[playerIdx][pieceIdx];

  // アニメーション後に実際の処理を実行
  animateMove(playerIdx, pieceIdx, rollVal, ()=>{
    state.selectedPieceIdx=null;
    state.currentRoll=null;
    applyMoveCore(playerIdx, pieceIdx, rollVal);
  });
}

function applyMoveCore(playerIdx,pieceIdx,rollVal){
  // 移動開始時に選択状態をリセット（↓の残像防止）
  state.selectedPieceIdx=null;
  state.currentRoll=null;
  const piece=state.pieces[playerIdx][pieceIdx];
  const myC=getPieceCoord(piece);
  let stacked=[pieceIdx];
  if(myC){state.pieces[playerIdx].forEach((p,i)=>{if(i===pieceIdx||p.pos===20||p.pos===-1)return;const c=getPieceCoord(p);if(c&&Math.abs(c.x-myC.x)<1&&Math.abs(c.y-myC.y)<1)stacked.push(i);});}
  stacked=[...new Set(stacked)];
  const result=movePiece(piece,rollVal);
  if(result.reachedGoal){
    stacked.forEach(i=>{state.pieces[playerIdx][i].pos=20;state.pieces[playerIdx][i].route='outer';state.pieces[playerIdx][i].diagPos=-1;});
    SE.goal();addLog(`${PLAYER_NAMES[playerIdx]} ゴール！`);
    if(state.pieces[playerIdx].every(p=>p.pos===20)){drawBoard();updateCards();showWinner(playerIdx);return;}
  }else if(result.stoppedAtCorner){
    stacked.forEach(i=>{state.pieces[playerIdx][i].pos=result.pos;state.pieces[playerIdx][i].route='outer';state.pieces[playerIdx][i].diagPos=-1;});
    const coord=getPieceCoord(state.pieces[playerIdx][pieceIdx]);
    const cap=checkCapture(playerIdx,coord);
    if(cap){state.rollCount=0;rollLimit=2;state.rolls.push({val:null,used:false,bonus:true});}
    addLog(`${PLAYER_NAMES[playerIdx]}：+${rollVal}マス（かど）`);
  }else{
    stacked.forEach(i=>{state.pieces[playerIdx][i].pos=result.pos;state.pieces[playerIdx][i].route=result.route;state.pieces[playerIdx][i].diagPos=result.diagPos;});
    const coord=getPieceCoord(state.pieces[playerIdx][pieceIdx]);
    const cap=checkCapture(playerIdx,coord);
    if(cap){state.rollCount=0;rollLimit=2;state.rolls.push({val:null,used:false,bonus:true});}
    SE.move();addLog(`${PLAYER_NAMES[playerIdx]}：+${rollVal}マス`);
  }
  const ri=state.rolls.findIndex(r=>!r.used&&r.val===rollVal);
  if(ri!==-1)state.rolls[ri].used=true;
  state.currentRoll=null;state.selectedPieceIdx=null;clickableAreas=[];
  drawBoard();updateCards();onAfterMove(playerIdx);
}

function onAfterMove(playerIdx){
  const bonusIdx=state.rolls.findIndex(r=>r.bonus&&!r.used);
  if(bonusIdx!==-1){
    state.rolls[bonusIdx].used=true;
    if(IS_CPU[playerIdx])setTimeout(()=>doCpuRoll(playerIdx),600);
    else{state.phase='roll';showArrows=false;document.getElementById('roll-btn').disabled=false;setMsg('踏んだ！もう1回振れる');setUI(playerIdx);}
    return;
  }
  const unused=state.rolls.filter(r=>!r.used&&r.val!==null);
  if(unused.length===0){setTimeout(()=>nextTurn(),600);}
  else{
    state.phase='move';
    state.selectedPieceIdx=null;
    state.currentRoll=null;
    if(IS_CPU[playerIdx])setTimeout(()=>doCpuMove(playerIdx),600);
    else{
      showArrows=true;
      setMsg(`残り${unused.length}回、コマを選んでください`);
      setUI(playerIdx);
      drawBoard();
      updateCards();
    }
  }
}

function setUI(playerIdx){
  const rBtn=document.getElementById('roll-btn');
  const rem=document.getElementById('rolls-remaining');
  if(IS_CPU[playerIdx]){rBtn.disabled=true;renderRolls();return;}
  const unused=state.rolls.filter(r=>!r.used&&r.val!==null);
  if(state.phase==='roll'){
    rBtn.disabled=false;rBtn.textContent='投げる';
    rem.textContent=unused.length>0?`残り${unused.length}回動かせます`:'';
  }else if(state.phase==='move'){
    rBtn.disabled=true;rBtn.textContent='投げる';
    rem.textContent=unused.length>0?`残り${unused.length}回動かせます`:'';
  }
  renderRolls();
}

function renderRolls(){
  const el=document.getElementById('pending-rolls');el.innerHTML='';
  state.rolls.filter(r=>r.val!==null).forEach(r=>{const b=document.createElement('span');b.className='roll-badge'+(r.used?' used':'');b.textContent=r.val+'マス';el.appendChild(b);});
}

function nextTurn(){state.turn=(state.turn+1)%NUM_PLAYERS;startTurn(state.turn);}

function startTurn(playerIdx){
  SE.nextTurn();
  state.phase='roll';state.rolls=[];state.rollCount=0;state.currentRoll=null;state.selectedPieceIdx=null;clickableAreas=[];showArrows=false;rollLimit=4;
  document.getElementById('turn-info').textContent=`${PLAYER_NAMES[playerIdx]}のターン`;
  document.getElementById('yut-result').textContent='－';
  setMsg('');setUI(playerIdx);drawBoard();updateCards();
  if(IS_CPU[playerIdx])setTimeout(()=>doCpuRoll(playerIdx),900);
}

function doCpuRoll(playerIdx){
  SE.roll();const roll=rollYut();state.rollCount++;state.rolls.push({val:roll.val,used:false});
  animateRoll(roll.faces,()=>{
    document.getElementById('yut-result').textContent=`${roll.val}マス`;
    addLog(`${PLAYER_NAMES[playerIdx]}：+${roll.val}マス`);renderRolls();
    if((roll.val===4||roll.val===5)&&state.rollCount<rollLimit)setTimeout(()=>doCpuRoll(playerIdx),700);
    else{state.phase='move';setTimeout(()=>doCpuMove(playerIdx),500);}
  });
}

function doCpuMove(playerIdx){
  const unused=state.rolls.filter(r=>!r.used&&r.val!==null);
  if(unused.length===0){setTimeout(()=>nextTurn(),400);return;}
  if(unused.length===0)return;
  const level=CPU_LEVEL[playerIdx];
  if(level>=3) cpuMoveStrong(playerIdx,unused[0]);
  else if(level>=2) cpuMoveMedium(playerIdx,unused[0]);
  else cpuMoveWeak(playerIdx,unused[0]);
}

// 中：ゴール優先→合体優先→踏み30%→ショートカット30%→進んだコマ
function cpuMoveMedium(playerIdx,roll){
  const avail=state.pieces[playerIdx].map((p,i)=>({p,i})).filter(({p})=>p.pos!==20);
  if(avail.length===0){setTimeout(()=>nextTurn(),400);return;}

  // ゴール優先
  for(const {p,i} of avail){
    const dest=getDestCoord(p,roll.val);
    if(dest&&dest.goal){applyMove(playerIdx,i,roll.val);return;}
  }

  // 合体優先（同じマスの自分コマに重なれるか）
  for(const {p,i} of avail){
    const dest=getDestCoord(p,roll.val);
    if(!dest||dest.goal)continue;
    const dc=getPieceCoord({pos:dest.result.pos,route:dest.result.route,diagPos:dest.result.diagPos});
    if(!dc)continue;
    const canStack=state.pieces[playerIdx].some((op,oi)=>{
      if(oi===i||op.pos===20||op.pos===-1)return false;
      const oc=getPieceCoord(op);
      return oc&&Math.abs(oc.x-dc.x)<1&&Math.abs(oc.y-dc.y)<1;
    });
    if(canStack){applyMove(playerIdx,i,roll.val);return;}
  }

  // 踏み（30%）
  if(Math.random()<0.3){
    for(const {p,i} of avail){
      const dest=getDestCoord(p,roll.val);
      if(!dest||dest.goal)continue;
      const dc=getPieceCoord({pos:dest.result.pos,route:dest.result.route,diagPos:dest.result.diagPos});
      if(!dc)continue;
      let canCapture=false;
      for(let op=0;op<NUM_PLAYERS;op++){
        if(op===playerIdx)continue;
        for(const op_p of state.pieces[op]){
          if(op_p.pos===20||op_p.pos===-1)continue;
          const oc=getPieceCoord(op_p);
          if(oc&&Math.abs(oc.x-dc.x)<1&&Math.abs(oc.y-dc.y)<1)canCapture=true;
        }
      }
      if(canCapture){applyMove(playerIdx,i,roll.val);return;}
    }
  }

  // ショートカット（30%）
  if(Math.random()<0.3){
    for(const {p,i} of avail){
      const r=movePiece(p,roll.val);
      if(r.stoppedAtCorner&&(r.pos===5||r.pos===10)){applyMove(playerIdx,i,roll.val);return;}
    }
  }

  cpuMoveWeak(playerIdx,roll);
}

// 弱：未出発優先→最も進んだコマ
function cpuMoveWeak(playerIdx,roll){
  const avail=state.pieces[playerIdx].map((p,i)=>({p,i})).filter(({p})=>p.pos!==20);
  if(avail.length===0){setTimeout(()=>nextTurn(),400);return;}
  const unstarted=avail.filter(({p})=>p.pos===-1);
  const idx=unstarted.length>0?unstarted[0].i:avail.sort((a,b)=>b.p.pos-a.p.pos)[0].i;
  applyMove(playerIdx,idx,roll.val);
}

// 強：ゴール優先→踏み優先→ショートカット優先→進んだコマ
function cpuMoveStrong(playerIdx,roll){
  const avail=state.pieces[playerIdx].map((p,i)=>({p,i})).filter(({p})=>p.pos!==20);
  if(avail.length===0){setTimeout(()=>nextTurn(),400);return;}

  // ゴールできるコマを優先
  for(const {p,i} of avail){
    const dest=getDestCoord(p,roll.val);
    if(dest&&dest.goal){applyMove(playerIdx,i,roll.val);return;}
  }

  // 相手を踏めるコマを優先
  for(const {p,i} of avail){
    const dest=getDestCoord(p,roll.val);
    if(!dest||dest.goal)continue;
    const dc=getPieceCoord({pos:dest.result.pos,route:dest.result.route,diagPos:dest.result.diagPos});
    if(!dc)continue;
    let canCapture=false;
    for(let op=0;op<NUM_PLAYERS;op++){
      if(op===playerIdx)continue;
      for(const op_p of state.pieces[op]){
        if(op_p.pos===20||op_p.pos===-1)continue;
        const oc=getPieceCoord(op_p);
        if(oc&&Math.abs(oc.x-dc.x)<1&&Math.abs(oc.y-dc.y)<1){canCapture=true;}
      }
    }
    if(canCapture){applyMove(playerIdx,i,roll.val);return;}
  }

  // かどに止まれるコマを優先（ショートカット）
  for(const {p,i} of avail){
    const r=movePiece(p,roll.val);
    if(r.stoppedAtCorner&&(r.pos===5||r.pos===10)){applyMove(playerIdx,i,roll.val);return;}
  }

  // 最も進んでいるコマ（出発前も出す）
  cpuMoveWeak(playerIdx,roll);
}

document.getElementById('roll-btn').addEventListener('click',()=>{
  if(IS_CPU[state.turn])return;
  SE.roll();const roll=rollYut();state.rollCount++;state.rolls.push({val:roll.val,used:false});
  document.getElementById('roll-btn').disabled=true;
  animateRoll(roll.faces,()=>{
    document.getElementById('yut-result').textContent=`${roll.val}マス`;
    addLog(`${PLAYER_NAMES[state.turn]}：+${roll.val}マス`);
    if((roll.val===4||roll.val===5)&&state.rollCount<4){
      state.phase='roll';
      setMsg('もう1回振れる！');
      document.getElementById('roll-btn').disabled=false;
    }else{
      state.phase='move';
      showArrows=true;
      setMsg('コマを選んでください');
    }
    setUI(state.turn);drawBoard();updateCards();
  });
});

let clickableAreas=[];
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');

canvas.addEventListener('click',e=>{
  if(IS_CPU[state.turn]||state.phase==='roll'||state.phase==='canRollOrMove')return;
  const rect=canvas.getBoundingClientRect(),sc=W/rect.width;
  const mx=(e.clientX-rect.left)*sc,my=(e.clientY-rect.top)*sc;
  if(state.selectedPieceIdx!==null){
    const hl=getHighlights(state.turn);
    for(const h of hl){
      if(h.goal){const sg=OUTER[0];if(Math.sqrt((mx-sg.x)**2+(my-sg.y)**2)<=30){applyMove(state.turn,h.pi,h.rollVal);return;}continue;}
      if(Math.sqrt((mx-h.coord.x)**2+(my-h.coord.y)**2)<=15){applyMove(state.turn,h.pi,h.rollVal);return;}
    }
    state.currentRoll=null;state.selectedPieceIdx=null;drawBoard();updateCards();setMsg('コマを選んでください');return;
  }
  for(const a of clickableAreas){
    if(Math.sqrt((mx-a.cx)**2+(my-a.cy)**2)<=a.r){
      const unused=state.rolls.filter(r=>!r.used&&r.val!==null);if(unused.length===0)return;
      state.currentRoll=unused[0].val;state.selectedPieceIdx=a.ci;
      setMsg(`移動先を選んでください（${unused.map(r=>r.val).join('・')}マス）`);
      drawBoard();updateCards();return;
    }
  }
});

canvas.addEventListener('mousemove',e=>{
  if(IS_CPU[state.turn])return;
  const rect=canvas.getBoundingClientRect(),sc=W/rect.width;
  const mx=(e.clientX-rect.left)*sc,my=(e.clientY-rect.top)*sc;
  let hit=clickableAreas.some(a=>Math.sqrt((mx-a.cx)**2+(my-a.cy)**2)<=a.r);
  if(!hit&&state.selectedPieceIdx!==null){
    const hl=getHighlights(state.turn),sg=OUTER[0];
    hit=hl.some(h=>h.goal?Math.sqrt((mx-sg.x)**2+(my-sg.y)**2)<=30:Math.sqrt((mx-h.coord.x)**2+(my-h.coord.y)**2)<=15);
  }
  canvas.style.cursor=hit?'pointer':'default';
});

function getHighlights(playerIdx){
  if(state.selectedPieceIdx===null)return[];
  const piece=state.pieces[playerIdx][state.selectedPieceIdx];
  if(!piece||piece.pos===20)return[];
  const unused=state.rolls.filter(r=>!r.used&&r.val!==null);
  const res=[],seen=new Set();
  const goalRolls=unused.filter(r=>{const d=getDestCoord(piece,r.val);return d&&d.goal;});
  if(goalRolls.length>0){const minR=goalRolls.reduce((a,b)=>a.val<=b.val?a:b);res.push({goal:true,pi:state.selectedPieceIdx,rollVal:minR.val});seen.add('goal');}
  unused.forEach(roll=>{
    const dest=getDestCoord(piece,roll.val);if(!dest||dest.goal)return;
    if(dest.coord){const key=`${dest.coord.x.toFixed(1)}_${dest.coord.y.toFixed(1)}`;if(!seen.has(key)){seen.add(key);res.push({coord:dest.coord,pi:state.selectedPieceIdx,rollVal:roll.val});}}
  });
  return res;
}

function updateCards(){
  for(let i=0;i<NUM_PLAYERS;i++){
    document.getElementById('pc'+i).classList.toggle('active',i===state.turn);
    const pp=document.getElementById('pp'+i);pp.innerHTML='';
    const pname=document.getElementById('pname'+i);
    if(pname) pname.style.display='';
    state.pieces[i].forEach((piece,pi)=>{
      if(piece.pos!==-1&&piece.pos!==20)return;
      if(animTarget&&animTarget.pi===i&&animTarget.ci===pi)return;
      const img=charImgs[i];
      let dot;
      if(img&&img.complete&&img.naturalWidth>0){
        dot=document.createElement('img');
        dot.src=img.src;
        dot.style.width='32px';dot.style.height='32px';
        dot.style.imageRendering='pixelated';
        dot.style.opacity=piece.pos===20?'0.25':'1';
      }else{
        dot=document.createElement('div');
        dot.className='piece-dot'+(piece.pos===20?' done':'');
        dot.style.background=PLAYER_COLORS[i];
      }
      const isFirstUnstarted=showArrows&&!IS_CPU[i]&&i===state.turn&&piece.pos===-1&&state.selectedPieceIdx===null&&state.pieces[i].filter(p=>p.pos===-1).indexOf(piece)===0;
      if(isFirstUnstarted){
        const wrap=document.createElement('div');
        wrap.style.cssText='position:relative;display:inline-block;cursor:pointer;';
        const arrow=document.createElement('div');
        arrow.style.cssText='position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:11px;color:#ff2222;font-weight:bold;pointer-events:none;text-shadow:-1px 0 #fff,1px 0 #fff,0 -1px #fff,0 1px #fff;line-height:1;';
        arrow.textContent='↓';

        wrap.appendChild(dot);
        wrap.appendChild(arrow);
        wrap.onclick=()=>{
          const unused=state.rolls.filter(r=>!r.used&&r.val!==null);if(unused.length===0)return;
          state.currentRoll=unused[0].val;state.selectedPieceIdx=pi;
          setMsg(`移動先を選んでください（${unused.map(r=>r.val).join('・')}マス）`);
          drawBoard();updateCards();
        };
        pp.appendChild(wrap);
        return;
      }
      if(!IS_CPU[i]&&i===state.turn&&state.phase==='move'&&piece.pos===-1&&state.selectedPieceIdx===null){
        // 矢印なし（2番目以降の手元コマ）はクリック不可
      }
      pp.appendChild(dot);
    });
  }
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}

function drawBoard(){
  ctx.clearRect(0,0,W,W);
  ctx.fillStyle='#252820';roundRect(ctx,0,0,W,W,10);ctx.fill();
  ctx.strokeStyle='#3a3e30';ctx.lineWidth=0.8;
  ctx.beginPath();OUTER.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
  [DIAG_RU,DIAG_RD].forEach(d=>{ctx.beginPath();d.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();});

  [0,5,10,15].forEach(idx=>{
    const p=OUTER[idx];
    ctx.fillStyle='#2e3228';ctx.strokeStyle='#5a6048';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(p.x,p.y,11,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#8a9870';ctx.font='500 7px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    if(idx===0){ctx.fillText('スタート',p.x,p.y-4);ctx.fillText('ゴール',p.x,p.y+5);}
  });
  OUTER.forEach((p,idx)=>{
    if([0,5,10,15].includes(idx))return;
    ctx.fillStyle='#3a3e30';ctx.strokeStyle='#4a4e3a';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();ctx.stroke();
  });

  const BCX=W/2,BCY=W/2;
  ctx.font='500 8px sans-serif';ctx.fillStyle='#4a5240';ctx.textAlign='center';ctx.textBaseline='middle';
  OUTER.forEach((p,idx)=>{
    if(idx===0)return;
    const dx=p.x-BCX,dy=p.y-BCY,len=Math.sqrt(dx*dx+dy*dy)||1;
    ctx.fillText(idx,p.x+(dx/len)*14,p.y+(dy/len)*14);
  });

  const DIAG_LABELS=[{p:DIAG_RU[0],l:'A1'},{p:DIAG_RU[1],l:'A2'},{p:DIAG_RU[3],l:'D1'},{p:DIAG_RU[4],l:'D2'},{p:DIAG_RD[0],l:'C1'},{p:DIAG_RD[1],l:'C2'},{p:DIAG_RD[3],l:'B1'},{p:DIAG_RD[4],l:'B2'}];
  const seen=new Set();
  [...DIAG_RU,...DIAG_RD].forEach(p=>{
    const key=`${p.x.toFixed(1)}_${p.y.toFixed(1)}`;if(seen.has(key))return;seen.add(key);
    const isCtr=Math.abs(p.x-CENTER.x)<0.1&&Math.abs(p.y-CENTER.y)<0.1;
    if(isCtr){
      ctx.fillStyle='#2e3228';ctx.strokeStyle='#5a6048';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle='#8a9870';ctx.font='500 7px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('中央',p.x,p.y-3);
    }else{
      ctx.fillStyle='#2e3228';ctx.strokeStyle='#4a5040';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
  });
  ctx.font='500 7px sans-serif';ctx.fillStyle='#4a6040';ctx.textAlign='center';ctx.textBaseline='top';
  DIAG_LABELS.forEach(({p,l})=>ctx.fillText(l,p.x,p.y+6));

  function drawArrow(x, y){
    ctx.save();
    ctx.fillStyle='#ff2222';
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=0.8;
    ctx.beginPath();
    const aw=7,ah=7,sw=3,sh=6;
    ctx.moveTo(x,y+ah);
    ctx.lineTo(x-aw/2,y);
    ctx.lineTo(x-sw/2,y);
    ctx.lineTo(x-sw/2,y-sh);
    ctx.lineTo(x+sw/2,y-sh);
    ctx.lineTo(x+sw/2,y);
    ctx.lineTo(x+aw/2,y);
    ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.restore();
  }


  if(showArrows&&state&&state.phase==='move'&&!IS_CPU[state.turn]&&state.rolls.filter(r=>!r.used&&r.val!==null).length>0){
    if(state.selectedPieceIdx===null){
      state.pieces[state.turn].forEach((piece)=>{
        if(piece.pos===20||piece.pos===-1) return;
        const coord=getPieceCoord(piece);
        if(coord) drawArrow(coord.x, coord.y-24);
      });
    } else {
      getHighlights(state.turn).forEach(h=>{
        if(h.goal){
          const sg=OUTER[0];
          ctx.strokeStyle='#f0d060';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(sg.x,sg.y,15,0,Math.PI*2);ctx.stroke();
          ctx.strokeStyle='#c8b87a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sg.x,sg.y,19,0,Math.PI*2);ctx.stroke();
          ctx.fillStyle='rgba(240,208,96,0.2)';ctx.beginPath();ctx.arc(sg.x,sg.y,19,0,Math.PI*2);ctx.fill();
          drawArrow(sg.x, sg.y-24);
          return;
        }
        drawArrow(h.coord.x, h.coord.y-24);
      });
    }
  }

  clickableAreas=[];
  if(!state)return;
  const cmap={};
  for(let pi=0;pi<NUM_PLAYERS;pi++){
    for(let ci=0;ci<NUM_PIECES;ci++){
      const piece=state.pieces[pi][ci];if(piece.pos===-1||piece.pos===20)continue;
      const coord=getPieceCoord(piece);if(!coord)continue;
      const key=`${coord.x.toFixed(1)}_${coord.y.toFixed(1)}`;
      if(!cmap[key])cmap[key]=[];cmap[key].push({pi,ci,coord});
    }
  }
    Object.values(cmap).forEach(list=>{
    // アニメーション中の対象コマは通常描画からスキップ
    const filteredList=list.filter(item=>!animTarget||(item.pi!==animTarget.pi||item.ci!==animTarget.ci));
    if(filteredList.length===0) return;
    const item=filteredList[0];
    const tot=filteredList.length;
    const cx=item.coord.x,cy=item.coord.y;
    const isSel=!IS_CPU[item.pi]&&item.pi===state.turn&&state.phase==='move'&&state.selectedPieceIdx===null;
    const charImg=charImgs[item.pi];
    if(charImg&&charImg.complete&&charImg.naturalWidth>0){
      ctx.save();

      const ix=cx-20,iy=cy-24,iw=40,ih=40;
      ctx.globalAlpha=0.8;
      for(const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]){ctx.drawImage(charImg,ix+dx,iy+dy,iw,ih);}
      ctx.globalAlpha=1;
      ctx.drawImage(charImg,ix,iy,iw,ih);
      if(tot>1){
        const bx=cx+12,by=cy+8;
        ctx.fillStyle='#e84040';ctx.beginPath();ctx.arc(bx,by,8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';ctx.font='bold 9px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tot,bx,by);
      }
      ctx.restore();
    }else{
      ctx.fillStyle=PLAYER_COLORS[item.pi];ctx.strokeStyle=isSel?'rgba(255,255,255,0.8)':'#1a1c18';ctx.lineWidth=isSel?2:1.5;
      ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();ctx.stroke();
      if(tot>1){
        const bx=cx+6,by=cy+6;
        ctx.fillStyle='#e84040';ctx.beginPath();ctx.arc(bx,by,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';ctx.font='bold 8px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(tot,bx,by);
      }
    }
    if(isSel)clickableAreas.push({cx,cy,r:20,pi:item.pi,ci:item.ci});
  });
}

function animateRoll(faces,cb){let f=0;const a=setInterval(()=>{[0,1,2,3].forEach(i=>{document.getElementById('s'+i).className='stick '+(Math.random()>0.5?'up':'down');});if(++f>10){clearInterval(a);faces.forEach((v,i)=>{document.getElementById('s'+i).className='stick '+v;});cb();}},70);}
function addLog(t){state.log.unshift(t);if(state.log.length>20)state.log.pop();document.getElementById('log-entries').innerHTML=state.log.join('<br>');}
function setMsg(t){document.getElementById('msg-bar').textContent=t;}
function showWinner(pi){SE.win();document.getElementById('win-text').textContent=`${PLAYER_NAMES[pi]} の勝利！`;document.getElementById('overlay').style.display='flex';}

document.getElementById('restart-btn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  document.getElementById('roll-btn').textContent='投げる';
  document.getElementById('log-entries').innerHTML='';
  // スタート画面に戻る
  document.getElementById('start-screen').style.display='flex';
});

// スタート画面のボタン操作
document.querySelectorAll('.level-btns').forEach(group=>{
  const playerIdx=parseInt(group.dataset.player);
  group.querySelectorAll('.level-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      group.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      CPU_LEVEL[playerIdx]=parseInt(btn.dataset.level);
    });
  });
});

document.getElementById('start-game-btn').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  // レスポンシブスケール
function applyScale(){
  const wrapper=document.getElementById('scale-wrapper');
  if(!wrapper)return;
  const gameW=wrapper.scrollWidth||640;
  const vw=window.innerWidth-32;
  const scale=Math.min(1, vw/gameW);
  wrapper.style.transform=`scale(${scale})`;
  wrapper.style.marginBottom=scale<1?`${(wrapper.scrollHeight*scale-wrapper.scrollHeight)}px`:'';
}
applyScale();
window.addEventListener('resize', applyScale);

state=initState();drawBoard();updateCards();startTurn(0);
});

// 初期描画（スタート画面表示中も盤面を見せる）
drawBoard();updateCards();
</script>
